<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="planetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" /> <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" /> </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="600" fill="#0b0f19" />

  <path d="M 230 250 A 180 60 0 1 0 570 250" fill="none" stroke="#1e293b" stroke-width="6" transform="rotate(-20 400 250)"/>

  <circle cx="400" cy="250" r="110" fill="url(#planetGrad)" filter="url(#glow)" opacity="0.9" />

  <path d="M 320 250 Q 400 300 480 250" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
  <path d="M 340 200 Q 400 240 460 200" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
  <path d="M 340 300 Q 400 340 460 300" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.4"/>

  <path d="M 570 250 A 180 60 0 0 0 230 250" fill="none" stroke="#3b82f6" stroke-width="8" transform="rotate(-20 400 250)" filter="url(#glow)"/>

  <circle cx="230" cy="250" r="8" fill="#ffffff" transform="rotate(-20 400 250)" filter="url(#glow)"/>

  <text x="50%" y="460" font-family="Segoe UI, Arial, sans-serif" font-size="80" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="20">N.O.V.A</text>
  
  <text x="50%" y="520" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="bold" fill="#94a3b8" text-anchor="middle" letter-spacing="6">ATMOSPHERIC INTELLIGENCE PLATFORM</text>
</svg>